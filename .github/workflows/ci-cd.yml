name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate backend import and compile
        run: |
          python -m compileall backend/app
          python - <<'PY'
          import pathlib
          import sys
          sys.path.insert(0, str(pathlib.Path('backend').resolve()))
          from app.core.config import APP_VERSION
          from app.main import app
          routes = {route.path for route in app.routes}
          assert '/health' in routes
          assert '/api/v1/layers' in routes
          assert app.version == APP_VERSION
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t cartopharma:ci .

  publish-ghcr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute version and image name
        id: meta_vars
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import pathlib
          import re
          text = pathlib.Path('backend/app/__init__.py').read_text(encoding='utf-8')
          match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not match:
              raise SystemExit('version not found')
          print(match.group(1))
          PY
          )
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta_vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.meta_vars.outputs.version }}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
